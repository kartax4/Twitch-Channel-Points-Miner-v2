<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twitch Miner - Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e10;
        color: #efeff1;
      }
      header {
        padding: 16px 24px;
        background: #18181b;
        border-bottom: 1px solid #2a2a2d;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 { font-size: 18px; margin: 0; color: #bf94ff; }
      .layout { display: flex; min-height: calc(100vh - 57px); }
      aside {
        width: 260px;
        background: #18181b;
        border-right: 1px solid #2a2a2d;
        overflow-y: auto;
      }
      .streamer {
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid #232327;
      }
      .streamer:hover, .streamer.active { background: #26262c; }
      .streamer .name { font-weight: 600; }
      .streamer .pts { font-size: 13px; color: #a970ff; }
      main { flex: 1; padding: 24px; }
      #chart { background: #18181b; border-radius: 8px; padding: 12px; }
      .muted { color: #adadb8; font-size: 13px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Twitch Miner</h1>
      <span class="muted" id="status">loading...</span>
    </header>
    <div class="layout">
      <aside id="list"></aside>
      <main>
        <div id="chart"></div>
        <p class="muted" id="empty" style="display:none">
          Select a streamer to view their channel-points history.
        </p>
      </main>
    </div>

    <script>
      let chart = null;
      let refreshMinutes = 5;
      let current = null;

      async function getConfig() {
        try {
          const cfg = await (await fetch("/api/config")).json();
          refreshMinutes = cfg.refresh_minutes || 5;
        } catch (e) {}
      }

      async function loadStreamers() {
        const list = document.getElementById("list");
        const streamers = await (await fetch("/api/streamers")).json();
        document.getElementById("status").textContent =
          streamers.length + " streamer(s)";
        list.innerHTML = "";
        for (const s of streamers) {
          const el = document.createElement("div");
          el.className = "streamer" + (s.name === current ? " active" : "");
          el.innerHTML =
            '<div class="name">' + s.name + "</div>" +
            '<div class="pts">' + (s.points || 0).toLocaleString() + " pts</div>";
          el.onclick = () => selectStreamer(s.name);
          list.appendChild(el);
        }
        if (!current && streamers.length) selectStreamer(streamers[0].name);
      }

      async function selectStreamer(name) {
        current = name;
        const data = await (await fetch("/api/json/" + name)).json();
        const series = (data.series || []).map((p) => [p.x, p.y]);
        renderChart(name, series);
        await loadStreamers();
      }

      function renderChart(name, series) {
        const options = {
          chart: { type: "line", height: 480, foreColor: "#adadb8",
                   animations: { enabled: false }, toolbar: { theme: "dark" } },
          theme: { mode: "dark" },
          stroke: { curve: "stepline", width: 2 },
          colors: ["#a970ff"],
          series: [{ name: name + " points", data: series }],
          xaxis: { type: "datetime" },
          yaxis: { labels: { formatter: (v) => Math.round(v).toLocaleString() } },
          title: { text: name, style: { color: "#efeff1" } },
          grid: { borderColor: "#2a2a2d" },
        };
        if (chart) chart.destroy();
        chart = new ApexCharts(document.getElementById("chart"), options);
        chart.render();
      }

      (async function init() {
        await getConfig();
        await loadStreamers();
        setInterval(loadStreamers, refreshMinutes * 60 * 1000);
      })();
    </script>
  </body>
</html>
